<!DOCTYPE html>
<html lang="en">
<head>

    <title>My Portfolio/Website</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; margin: 0; padding: 20px; background: #f4f4f4; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 8px; }
        h1 { color: #333; }
        
        /* Image Gallery Styling */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .image-card {
            background: #eee;
            border: 1px solid #ddd; /* Changed from dashed for a cleaner look */
            border-radius: 5px;
            padding: 15px;
            text-align: center;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            display: block;
            margin-bottom: 10px;
        }
        .label { font-weight: bold; font-size: 0.9em; color: #666; margin-bottom: 15px; }

        /* Button Styling */
        .btn {
            display: inline-block;
            background: #333;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .btn:hover {
            background: #555;
        }

        .btn-main {
            margin-top: 10px;
            background: #007bff; /* A blue color for the main action */
        }
        
        .btn-main:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Welcome to My Website</h1>
    <p>This layout is ready for your content. Replace the placeholder images below with your own files.</p>
    <a href="#contact" class="btn btn-main">Contact Me</a>

    <div class="gallery">
        <div class="image-card">
            <img src="https://via.placeholder.com/400x300?text=Main+Feature+Image" alt="Placeholder 1">
            <div class="label">Feature Image 1</div>
            <a href="#" class="btn">View Project</a>
        </div>

        <div class="image-card">
            <img src="https://via.placeholder.com/400x300?text=Second+Project+Image" alt="Placeholder 2">
            <div class="label">Feature Image 2</div>
            <a href="#" class="btn">View Project</a>
        </div>

        <div class="image-card">
            <img src="https://via.placeholder.com/400x300?text=Third+Project+Image" alt="Placeholder 3">
            <div class="label">Feature Image 3</div>
            <a href="#" class="btn">View Project</a>
        </div>
    </div>
</div>

</body>
</html>

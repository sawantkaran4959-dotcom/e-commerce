<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="XEDVOXbz73tkebp5uRYTKn-Cn-hWqe6CHJno7y3V7YU" />
    <title>My Portfolio/Website</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; margin: 0; padding: 20px; background: #f4f4f4; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 8px; }
        h1 { color: #333; }
        
        /* Image Gallery Styling */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .image-card {
            background: #eee;
            border: 2px dashed #bbb;
            border-radius: 5px;
            padding: 10px;
            text-align: center;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            display: block;
            margin-bottom: 10px;
        }
        .label { font-weight: bold; font-size: 0.9em; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>aplle</h1>
    <p>This layout is ready for your content. Replace the placeholder images below with your own files.</p>

    <div class="gallery">
        <div class="image-card">
            <img src="https://www.collinsdictionary.com/dictionary/english/apple">
            <div class="label">Feature Image 1</div>
        </div>

        <div class="image-card">
            <img src="https://www.southernliving.com/food/fruits/banana/should-you-refrigerate-bananas?srsltid=AfmBOorpPi4Wl0q2lh_mdi1pC-HP9KDFK4hM0_QNsmMijtfhXIkY1OE_>
            <div class="label">Feature Image 2</div>
        </div>

        <div class="image-card">
            <img src="https://bagrrys.com/products/bagrry-s-100-jumbo-rolled-oats-1-2kg-jar?srsltid=AfmBOorUr4BFjy9gurKF1AruI6ALtRX33CR7ptnNUh5FFKwsjSPp4Kj1">
            <div class="label">Feature Image 3</div>
        </div>
    </div>
</div>

</body>
</html>
